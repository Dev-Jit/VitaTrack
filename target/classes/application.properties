spring.application.name=vitatrack
server.port=${SERVER_PORT:8081}

# -------------------------
# PostgreSQL datasource
# -------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vitatrack}
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------
# JPA / Hibernate
# -------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# -------------------------
# SQL init (seed data.sql on Postgres)
# -------------------------
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# -------------------------
# JWT configuration
# -------------------------
# Replace this in real environments with a strong secret from env/secret manager.
app.jwt.secret=replace-with-a-very-long-random-secret-key
app.jwt.expiration-ms=86400000

# -------------------------
# CORS configuration (React dev server)
# -------------------------
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
