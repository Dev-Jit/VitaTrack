spring.application.name=vitatrack
# Load root .env file values (DB_URL, DB_USERNAME, DB_PASSWORD, etc.)
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8081}

# -------------------------
# PostgreSQL datasource
# -------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vitatrack}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------
# JPA / Hibernate
# -------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# -------------------------
# SQL init (seed data.sql on Postgres)
# -------------------------
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# -------------------------
# JWT configuration
# -------------------------
# Replace APP_JWT_SECRET in real environments with a strong secret.
app.jwt.secret=${APP_JWT_SECRET:replace-with-a-very-long-random-secret-key}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# -------------------------
# CORS configuration (React dev server)
# -------------------------
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${APP_CORS_ALLOWED_HEADERS:*}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:true}
